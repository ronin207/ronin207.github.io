<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!--
    Takumi's Mark: A "T" formed from lattice nodes and edges.
    Represents lattice-based cryptography, the neural particle background,
    and the precision of a craftsman (匠 = Takumi).
  -->

  <!-- Lattice edges forming the T structure -->
  <g stroke="#10b981" stroke-width="1.5" stroke-linecap="round" opacity="0.5">
    <!-- Top bar connections -->
    <line x1="12" y1="14" x2="24" y2="14"/>
    <line x1="24" y1="14" x2="32" y2="10"/>
    <line x1="32" y1="10" x2="40" y2="14"/>
    <line x1="40" y1="14" x2="52" y2="14"/>

    <!-- Diagonal lattice braces -->
    <line x1="24" y1="14" x2="28" y2="22"/>
    <line x1="40" y1="14" x2="36" y2="22"/>

    <!-- Stem connections -->
    <line x1="28" y1="22" x2="36" y2="22"/>
    <line x1="28" y1="22" x2="30" y2="34"/>
    <line x1="36" y1="22" x2="34" y2="34"/>
    <line x1="30" y1="34" x2="34" y2="34"/>
    <line x1="30" y1="34" x2="32" y2="46"/>
    <line x1="34" y1="34" x2="32" y2="46"/>

    <!-- Lower lattice extension -->
    <line x1="32" y1="46" x2="32" y2="54"/>
  </g>

  <!-- Primary T structure edges -->
  <g stroke="#10b981" stroke-width="2" stroke-linecap="round">
    <!-- Top horizontal bar -->
    <line x1="12" y1="14" x2="52" y2="14"/>

    <!-- Vertical stem -->
    <line x1="32" y1="14" x2="32" y2="54"/>
  </g>

  <!-- Lattice nodes (dots at intersections) -->
  <g fill="#10b981">
    <!-- Top bar nodes -->
    <circle cx="12" cy="14" r="2.5"/>
    <circle cx="24" cy="14" r="1.8"/>
    <circle cx="32" cy="10" r="1.5" opacity="0.6"/>
    <circle cx="40" cy="14" r="1.8"/>
    <circle cx="52" cy="14" r="2.5"/>

    <!-- Central intersection node (the convergence point) -->
    <circle cx="32" cy="14" r="3" fill="#10b981"/>
    <circle cx="32" cy="14" r="5" fill="none" stroke="#10b981" stroke-width="1" opacity="0.3"/>

    <!-- Stem lattice nodes -->
    <circle cx="28" cy="22" r="1.5" opacity="0.6"/>
    <circle cx="36" cy="22" r="1.5" opacity="0.6"/>
    <circle cx="30" cy="34" r="1.5" opacity="0.5"/>
    <circle cx="34" cy="34" r="1.5" opacity="0.5"/>
    <circle cx="32" cy="46" r="1.8"/>

    <!-- Terminal node -->
    <circle cx="32" cy="54" r="2.5"/>
  </g>
</svg>
